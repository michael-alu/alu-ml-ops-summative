# Load-balances requests across all api replicas started by docker compose.
# The resolver plus a variable in proxy_pass forces per-request DNS resolution,
# so Docker's embedded DNS (127.0.0.11) round-robins across every replica.
events {}

http {
    resolver 127.0.0.11 valid=5s ipv6=off;

    server {
        listen 8080;

        location / {
            set $backend "api:8000";
            proxy_pass http://$backend$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
