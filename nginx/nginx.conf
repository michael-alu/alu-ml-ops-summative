# Round-robins requests across all api replicas started by docker compose.
events {}

http {
    upstream api_backend {
        server api:8000;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
